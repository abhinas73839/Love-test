<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ Love Loyalty Test</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>❤️ Love Loyalty Test</h1>

        <p>
            Discover your loyalty score, trust level and relationship strength with our fun love quiz.
        </p>

        <button id="startBtn">
            Start Test
        </button>

    </div>

</div>

<div id="quiz" class="hide">

    <div class="quiz-card">

        <h2 id="question"></h2>

        <div id="answers"></div>

        <button id="nextBtn">Next</button>

    </div>

</div>

<div id="result" class="hide">

    <div class="result-card">

        <h2>Your Result ❤️</h2>

        <h1 id="score"></h1>

        <div class="progress">
            <div id="bar"></div>
        </div>

        <p id="message"></p>

        <button onclick="location.reload()">
            Try Again
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
